<div class="modal-overlay" (click)="close.emit()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>{{ permission() ? 'Edit Permission' : 'Add Permission' }}</h3>
      <button class="modal-close" (click)="close.emit()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Name</label>
        <input type="text" class="form-input" placeholder="e.g. user:read" [ngModel]="name()" (ngModelChange)="name.set($event)" />
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" class="form-input" placeholder="Optional description" [ngModel]="description()" (ngModelChange)="description.set($event)" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" (click)="close.emit()">Cancel</button>
      <button class="btn-save" (click)="onSave()" [disabled]="!name()">Save</button>
    </div>
  </div>
</div>
