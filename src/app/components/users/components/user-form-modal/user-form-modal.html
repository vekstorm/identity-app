<div class="modal-overlay" (click)="onClose()">
  <div class="modal-card" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>{{ isEdit() ? 'Edit User' : 'Add User' }}</h3>
      <button class="modal-close" (click)="onClose()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>Username *</label>
          <input type="text" class="form-control" [ngModel]="username()" (ngModelChange)="username.set($event)" required />
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" class="form-control" [ngModel]="email()" (ngModelChange)="email.set($event)" required />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Password {{ isEdit() ? '(leave blank to keep)' : '*' }}</label>
          <input type="password" class="form-control" [ngModel]="password()" (ngModelChange)="password.set($event)" />
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" class="form-control" [ngModel]="phone()" (ngModelChange)="phone.set($event)" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Name</label>
          <input type="text" class="form-control" [ngModel]="name()" (ngModelChange)="name.set($event)" />
        </div>
        <div class="form-group">
          <label>Surname 1</label>
          <input type="text" class="form-control" [ngModel]="surname1()" (ngModelChange)="surname1.set($event)" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Surname 2</label>
          <input type="text" class="form-control" [ngModel]="surname2()" (ngModelChange)="surname2.set($event)" />
        </div>
        <div class="form-group"></div>
      </div>

      <div class="form-section">Roles</div>
      <div class="roles-grid">
        @for (role of allRoles(); track role.name) {
          <label class="role-check">
            <input type="checkbox" [checked]="selectedRoles()[role.name]" (change)="toggleRole(role.name, $event)" />
            <span>{{ role.name }}</span>
          </label>
        }
      </div>

      <div class="form-section">Status</div>
      <label class="toggle-label">
        <input type="checkbox" [checked]="disabled()" (change)="toggleDisabled($event)" />
        <span>Disabled</span>
      </label>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" (click)="onClose()">Cancel</button>
      <button class="btn-save" (click)="onSave()">{{ isEdit() ? 'Update' : 'Create' }}</button>
    </div>
  </div>
</div>
